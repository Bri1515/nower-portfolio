version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nower_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - nower_pg_data:/var/lib/postgresql/data

volumes:
  nower_pg_data:
